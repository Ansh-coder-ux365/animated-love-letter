<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Animated Love Letter 💌</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <div class="envelope" id="envelope">
      <div class="letter">
        <h1>💖 Dear You 💖</h1>
        <p id="text"></p>
        <span class="signature">— From Me</span>
      </div>
    </div>

    <button id="openBtn">Open Letter 💌</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
